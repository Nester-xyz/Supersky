name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        # npm install, not npm ci: the committed lockfile is generated on
        # Windows, where npm prunes the Linux/wasm optional-dependency branch of
        # @tailwindcss/oxide (@emnapi/*). npm ci strict-checks that tree and
        # fails on the Linux runner; npm install reconciles it against the lock.
        run: npm install --no-audit --no-fund

      - name: Prepare WXT types
        run: npx wxt prepare

      - name: Typecheck
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Build & package zip
        run: npm run zip

      - name: Upload build for inspection
        uses: actions/upload-artifact@v4
        with:
          name: supersky-chrome-${{ github.sha }}
          path: .output/*-chrome.zip
          # WXT builds into .output, a dot-directory, which upload-artifact's
          # glob treats as hidden and skips unless told otherwise.
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 14
